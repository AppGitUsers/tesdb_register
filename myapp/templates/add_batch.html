<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if batch %}Edit{% else %}Add{% endif %} Batch — TESDB</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;
            --border:#2a2a3d;--accent:#6c63ff;--accent2:#ff6584;
            --accent3:#43e97b;--text:#e8e8f0;--muted:#6b6b8a;--card:#15151f;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body {
            font-family:'Space Grotesk',sans-serif;
            background:var(--bg);color:var(--text);
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            position:relative;overflow:hidden;padding:24px;
        }
        body::before {
            content:'';position:absolute;inset:0;
            background-image:linear-gradient(rgba(108,99,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,0.05) 1px,transparent 1px);
            background-size:60px 60px;animation:gridMove 20s linear infinite;pointer-events:none;
        }
        @keyframes gridMove{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}
        .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.1;animation:float 8s ease-in-out infinite;}
        .orb-1{width:300px;height:300px;background:var(--accent);top:-60px;right:-60px;}
        .orb-2{width:200px;height:200px;background:var(--accent3);bottom:-40px;left:-40px;animation-delay:-4s;}
        @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,10px)}}

        .card {
            position:relative;z-index:1;
            background:var(--card);border:1px solid var(--border);
            border-radius:20px;padding:40px 44px;width:90%;max-width:500px;
            box-shadow:0 24px 80px rgba(0,0,0,0.5);
            animation:fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

        .logo{font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:20px;}
        h2{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:32px;}
        h2 span{color:var(--accent);}

        .form-group{margin-bottom:20px;}
        .form-group label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-weight:600;}
        .form-group input {
            width:100%;background:var(--bg3);border:1px solid var(--border);
            color:var(--text);padding:12px 14px;border-radius:10px;
            font-size:14px;font-family:'Space Grotesk',sans-serif;
            outline:none;transition:border-color 0.2s,box-shadow 0.2s;
        }
        .form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.15);}
        /* make time input icon white */
        .form-group input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(1);}

        .actions{display:flex;gap:12px;margin-top:8px;}
        .btn-submit {
            flex:1;background:var(--accent);color:white;border:none;
            padding:13px;border-radius:10px;font-size:14px;font-weight:600;
            cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all 0.2s;
        }
        .btn-submit:hover{background:#5a52e0;transform:translateY(-1px);box-shadow:0 8px 20px rgba(108,99,255,0.3);}
        .btn-back {
            flex:1;background:var(--bg3);color:var(--muted);border:1px solid var(--border);
            padding:13px;border-radius:10px;font-size:14px;font-weight:600;
            cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all 0.2s;
            text-decoration:none;display:flex;align-items:center;justify-content:center;
        }
        .btn-back:hover{border-color:var(--accent);color:var(--text);}

        .alert{
            padding:11px 14px;border-radius:8px;margin-bottom:20px;font-size:13px;
            display:flex;align-items:center;gap:8px;
        }
        .alert-success{background:rgba(67,233,123,0.1);border:1px solid rgba(67,233,123,0.3);color:var(--accent3);}
        .alert-error{background:rgba(255,101,132,0.1);border:1px solid rgba(255,101,132,0.3);color:var(--accent2);}
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="card">
        <div class="logo">TESDB</div>
        <h2>{% if batch %}<span>Edit</span> Batch{% else %}<span>Add</span> New Batch{% endif %}</h2>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            <span>{% if message.tags == 'success' %}✓{% else %}⚠{% endif %}</span>
            <span>{{ message }}</span>
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Batch Name</label>
                <input type="text" name="batch_name" value="{{ batch.batch_name|default:'' }}" placeholder="e.g. Morning Batch" required>
            </div>
            <div class="form-group">
                <label>Start Time</label>
                <input type="time" name="start_time" value="{{ batch.start_time|time:'H:i' }}" required>
            </div>
            <div class="form-group">
                <label>End Time</label>
                <input type="time" name="end_time" value="{{ batch.end_time|time:'H:i' }}" required>
            </div>
            <div class="actions">
                <a href="{% url 'get_batches' %}" class="btn-back">← Back</a>
                <button type="submit" class="btn-submit">{% if batch %}Update Batch{% else %}Add Batch{% endif %}</button>
            </div>
        </form>
    </div>
</body>
</html>
