<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login — TESDB</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a26;
            --border: #2a2a3d; --accent: #6c63ff; --accent2: #ff6584;
            --accent3: #43e97b; --text: #e8e8f0; --muted: #6b6b8a; --card: #15151f;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(108,99,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108,99,255,0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove { 0%{transform:translate(0,0)} 100%{transform:translate(60px,60px)} }
        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.12; animation: float 8s ease-in-out infinite;
        }
        .orb-1 { width:350px;height:350px;background:var(--accent);top:-80px;left:-80px; }
        .orb-2 { width:250px;height:250px;background:var(--accent2);bottom:-60px;right:-60px;animation-delay:-4s; }
        @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,15px)} }

        .card {
            position: relative; z-index: 1;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 48px 44px; width: 90%; max-width: 420px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
            animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

        .logo { font-size:11px; font-weight:600; letter-spacing:4px; text-transform:uppercase; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-bottom:24px; }
        .lock-icon { font-size:40px; margin-bottom:16px; display:block; animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        h2 { font-size:26px; font-weight:700; letter-spacing:-0.5px; margin-bottom:32px; }
        h2 span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

        .input-group { position:relative; margin-bottom:18px; }
        .input-icon { position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted);transition:color 0.2s; }
        input {
            width:100%; background:var(--bg3); border:1px solid var(--border);
            color:var(--text); padding:12px 14px 12px 42px; border-radius:10px;
            font-size:14px; font-family:'Space Grotesk',sans-serif;
            outline:none; transition:border-color 0.2s,box-shadow 0.2s;
        }
        input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(108,99,255,0.15); }
        input:focus ~ .input-icon { color:var(--accent); }
        input::placeholder { color:var(--muted); }

        .submit-btn {
            width:100%; background:var(--accent); color:white; border:none;
            padding:13px; border-radius:10px; font-size:15px; font-weight:600;
            cursor:pointer; font-family:'Space Grotesk',sans-serif;
            transition:all 0.2s; margin-top:8px; position:relative; overflow:hidden;
        }
        .submit-btn:hover { background:#5a52e0; transform:translateY(-1px); box-shadow:0 8px 20px rgba(108,99,255,0.35); }
        .submit-btn.loading { pointer-events:none; opacity:0.7; }
        .submit-btn.loading::after {
            content:''; position:absolute; width:18px;height:18px;
            top:50%;left:50%;margin:-9px 0 0 -9px;
            border:2px solid rgba(255,255,255,0.3);border-top-color:white;
            border-radius:50%; animation:spin 0.6s linear infinite;
        }
        @keyframes spin { to{transform:rotate(360deg)} }

        .footer-link { text-align:center; margin-top:20px; font-size:13px; color:var(--muted); }
        .footer-link a { color:var(--accent); text-decoration:none; font-weight:600; }
        .footer-link a:hover { color:#a29bfe; }

        .message {
            background:rgba(255,101,132,0.1); border:1px solid rgba(255,101,132,0.3);
            color:var(--accent2); padding:11px 14px; border-radius:8px;
            margin-top:14px; font-size:13px;
            animation:shake 0.4s ease;
        }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="card">
        <div class="logo">TESDB</div>
        <span class="lock-icon">🔐</span>
        <h2><span>Staff</span> Login</h2>
        <form method="POST" id="loginForm">
            {% csrf_token %}
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
                <span class="input-icon">👤</span>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
                <span class="input-icon">🔒</span>
            </div>
            <button type="submit" class="submit-btn" id="loginBtn">Login</button>
        </form>
        <div class="footer-link">Don't have an account? <a href="{% url 'register_staff' %}">Register here</a></div>
        {% for message in messages %}
        <div class="message">{{ message }}</div>
        {% endfor %}
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function() {
            document.getElementById('loginBtn').classList.add('loading');
        });
    </script>
</body>
</html>
